name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # 型チェック / ビルド / 単体テスト(Vitest)
  checks:
    name: typecheck・build・vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript 型チェック
        run: npm run typecheck
      - name: 本番ビルド
        run: npm run build
      - name: 単体テスト(Vitest)
        run: npm run test

  # E2E(Playwright)
  e2e:
    name: playwright E2E
    runs-on: ubuntu-latest
    # 本番モードの next start では seed パスワードがフェイルクローズされるため、
    # E2E 用に既知のデモパスワードを注入する(サーバー起動とテストで共有)。
    env:
      SEED_DEMO_PASSWORD: e2e-demo-pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Playwright ブラウザ導入
        run: npx playwright install --with-deps chromium
      - name: ビルド
        run: npm run build
      - name: サーバー起動(バックグラウンド)
        run: |
          npm run start -- -p 3100 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3100/login >/dev/null; then echo "server up"; exit 0; fi
            sleep 1
          done
          echo "server failed to start"; exit 1
      - name: E2E 実行
        env:
          E2E_BASE_URL: http://localhost:3100
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # DB マイグレーション + Seed + RLS 実機テスト(実 PostgreSQL + pgvector)
  db-rls:
    name: migrations・seed・RLS 実機テスト
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: PostgreSQL クライアント導入
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: マイグレーション + Seed + RLS 実機テスト
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: bash supabase/test/run.sh
